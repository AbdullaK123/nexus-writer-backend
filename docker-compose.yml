services:
  postgres-nexus:
    # pgvector image — same PG version as base; ships the `vector` extension
    # for the scene embedding column. Switch back to plain postgres only if
    # you've also dropped the embedding stuff.
    image: pgvector/pgvector:pg18
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: nexus_writer
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_nexus_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_user -d nexus_writer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nexus-network

  nexus-writer:
    build: .
    ports:
      - 8000:8000
    volumes:
      - ./migrations:/app/migrations
    command: >
      sh -c "uv run --no-sync yoyo apply --batch
      --database postgresql://nexus_user:password@postgres-nexus:5432/nexus_writer
      ./migrations/yoyo &&
      uv run --no-sync uvicorn main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nexus_user:password@postgres-nexus:5432/nexus_writer
    depends_on:
      postgres-nexus:
        condition: service_healthy
    networks:
      - nexus-network

  worker:
    build: .
    command: ["uv", "run", "--no-sync", "worker.py"]
    env_file: .env
    environment: 
      DATABASE_URL: postgresql://nexus_user:password@postgres-nexus:5432/nexus_writer
    depends_on:
      postgres-nexus:
        condition: service_healthy
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker_heartbeat -mmin -2 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  nexus-network:
    driver: bridge

volumes:
  postgres_nexus_data:
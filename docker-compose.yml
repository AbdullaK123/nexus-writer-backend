services:
  postgres-nexus:
    image: postgres:18.1-alpine
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: nexus_writer
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_nexus_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_user -d nexus_writer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nexus-network

  nexus-writer:
    build: .
    ports:
      - 8000:8000
    command: >
      sh -c "
        if uv run aerich upgrade; then
          echo 'Migrations applied';
        else
          echo 'No migration history found, initializing DB'
          uv run aerich init-db
        fi &&
        uv run uvicorn main:app --host 0.0.0.0 --port 8000
      "
    env_file: .env
    environment:
      DATABASE_URL: asyncpg://nexus_user:password@postgres-nexus:5432/nexus_writer
    depends_on:
      postgres-nexus:
        condition: service_healthy
    networks:
      - nexus-network

  extraction_worker:
    build: 
      dockerfile: Dockerfile.worker
    command: ["uv", "run", "extraction_worker.py"]
    env_file: .env
    environment:
      DATABASE_URL: asyncpg://nexus_user:password@postgres-nexus:5432/nexus_writer
    depends_on:
      postgres-nexus:
        condition: service_healthy
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/extraction_worker_heartbeat -mmin -2 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  session_worker:
    build: 
      dockerfile: Dockerfile.worker
    command: ["uv", "run", "session_worker.py"]
    env_file: .env
    environment: 
      DATABASE_URL: asyncpg://nexus_user:password@postgres-nexus:5432/nexus_writer
    depends_on:
      postgres-nexus:
        condition: service_healthy
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/session_worker_heartbeat -mmin -2 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  summary_worker:
    build: 
      dockerfile: Dockerfile.worker
    command: ["uv", "run", "summary_worker.py"]
    env_file: .env
    environment: 
      DATABASE_URL: asyncpg://nexus_user:password@postgres-nexus:5432/nexus_writer
    depends_on:
      postgres-nexus:
        condition: service_healthy
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/summary_worker_heartbeat -mmin -2 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  nexus-network:
    driver: bridge

volumes:
  postgres_nexus_data:
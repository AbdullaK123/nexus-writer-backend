auth:
  password_pattern: '^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*()_+\-=\[\]{};:''"\\|,.<>/?]).{8,}$'
  session_ttl_days: 1
  cookie_max_age_seconds: 86400

http:
  max_body_size_bytes: 10485760  # 10 MB

postgres:
  pool_min_size: 5
  pool_max_size: 20
  max_inactive_connection_lifetime: 300

jobs:
  session_cleanup_cron_expression: "0 * * * *"
  scene_extraction_cron_expression: "0 */2 * * * *"
  scene_extraction_batch_size: 5
  scene_extraction_window_seconds: 60

ai:
  default_model: gpt-5.4-2026-03-05
  temperature: 0.0
  max_retries: 3
  timeout: 300.0
  max_concurrent_requests: 16
  scene_extraction_max_tokens: 8000
  extraction_retry_attempts: 3
  extraction_retry_wait_seconds: 1.0